<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="container">
        <div class="header">
          <div class="logo">
            FlightFinder
          </div>
          <h1>Welcome to FlightFinder</h1>
          <p class="subtitle">Your journey begins with us</p>
        </div>
        
        <div class="tabs">
          <div class="tab active" onclick="switchTab('signin')">Sign In</div>
          <div class="tab" onclick="switchTab('register')">Create Account</div>
        </div>
        
        <div id="signin" class="form-content active">
          <form id="signin-form">
            <div class="form-group">
              <label for="signin-email">Email or Frequent Flyer Number</label>
              <input type="text" id="signin-email" name="email" required>
            </div>
            
            <div class="form-group">
              <label for="signin-password">Password</label>
              <input type="password" id="signin-password" name="password" required>
            </div>
            
            <div class="checkbox-group">
              <input type="checkbox" id="remember" name="remember">
              <label for="remember">Remember me on this device</label>
            </div>
            
            <button type="submit"><a href="flight.html"> Sign In</button></a>
            
            <div class="links">
              <a href="#">Forgot Password?</a>
              <a href="#">Forgot Username?</a>
            </div>
            
            <div class="separator">
              <span class="separator-text">or sign in with</span>
            </div>
            
            <div class="social-buttons">
              <button type="button" class="social-button">
                <i class="fa-brands fa-google"></i> Google
              </button>
              <button type="button" class="social-button">
                <i class="fa-brands fa-facebook-f"></i> Facebook
              </button>
              <button type="button" class="social-button">
                <i class="fa-brands fa-apple"></i> Apple
              </button>
            </div>
          </form>
        </div>
        
        <div id="register" class="form-content">
          <form id="registration-form">
            <div class="form-row">
              <div class="form-group">
                <label for="first-name" class="required">First Name</label>
                <input type="text" id="first-name" name="first-name" required>
              </div>
              <div class="form-group">
                <label for="last-name" class="required">Last Name</label>
                <input type="text" id="last-name" name="last-name" required>
              </div>
            </div>
            
            <div class="form-group">
              <label for="email" class="required">Email Address</label>
              <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="password" class="required">Password</label>
                <input type="password" id="password" name="password" required>
                <p class="password-requirements">Password must be at least 8 characters and include letters, numbers, and special characters</p>
              </div>
              <div class="form-group">
                <label for="confirm-password" class="required">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
              </div>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone">
              </div>
              <div class="form-group">
                <label for="date-of-birth" class="required">Date of Birth</label>
                <input type="date" id="date-of-birth" name="date-of-birth" required>
              </div>
            </div>
            
            <div class="form-group">
              <label for="nationality">Nationality</label>
              <select id="nationality" name="nationality">
                <option value="">Select your nationality</option>
                <option value="us">United States</option>
                <option value="ca">Canada</option>
                <option value="uk">United Kingdom</option>
                <option value="au">Australia</option>
                <option value="ph">Philippines</option>
                <option value="other">Other</option>
              </select>
            </div>
            
            <div class="form-group">
              <label for="passport">Passport Number</label>
              <input type="text" id="passport" name="passport">
            </div>
            
            <div class="form-group">
              <label for="frequent-flyer">Frequent Flyer Number (if any)</label>
              <input type="text" id="frequent-flyer" name="frequent-flyer">
            </div>
            
            <div class="checkbox-group">
              <input type="checkbox" id="newsletter" name="newsletter">
              <label for="newsletter">Subscribe to receive special offers and travel deals</label>
            </div>
            
            <div class="checkbox-group">
              <input type="checkbox" id="terms" name="terms" required>
              <label for="terms" class="required">I agree to the Terms and Conditions and Privacy Policy</label>
            </div>
            
            <button type="submit"><a href="flight.html">Account</button></a>
          </form>
        </div>
        
        <div class="terms">
          <a href="#">Terms of Service</a> | <a href="#">Privacy Policy</a> | <a href="#">Help Center</a>
        </div>
      </div>
</body>
</html>

<script>
  function switchTab(tabId) {
    const formContents = document.querySelectorAll('.form-content');
    formContents.forEach(form => {
      form.classList.remove('active');
    });
    
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.classList.remove('active');
    });
    
    document.getElementById(tabId).classList.add('active');
    const clickedTab = Array.from(tabs).find(tab => tab.textContent.toLowerCase().includes(tabId));
    if (clickedTab) {
      clickedTab.classList.add('active');
    }
  }
</script>
